services:
  portainer:
    image: portainer/portainer-ce:latest
    volumes:
      - portainer_data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    ports:
      - "9000:9000"
    networks:
      - proxy
volumes:
  portainer_data:
networks:
  proxy:
    external: true
