services:
  nominatim:
    image: mediagis/nominatim:4.5
    container_name: nominatim
    environment:
      NOMINATIM_POSTGRES_HOST: 127.0.0.1 # Replace with your actual PostgreSQL host (e.g., dbserver or IP)
      NOMINATIM_POSTGRES_PORT: 5432 # Default PostgreSQL port
      NOMINATIM_POSTGRES_USER: nominatim # Replace with the PostgreSQL user
      NOMINATIM_POSTGRES_PASSWORD: nominatim # Replace with the PostgreSQL password
      NOMINATIM_POSTGRES_DBNAME: nominatim-db # Replace with your target database for Nominatim
    volumes:
      - nominatim_data:/var/lib/nominatim
      - ./data:/data # Mount the directory containing the .osm.pbf file
    ports:
      - "8080:8080"
    command: bash -c "nominatim import --osm-file /data/dublin.osm.pbf --threads 4 && nominatim webserver"

volumes:
  nominatim_data:
